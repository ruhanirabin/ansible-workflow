[defaults]
inventory = inventory/hosts.yml
# Absolute path is required for cron compatibility; relative paths may fail
# when ansible-playbook runs from a different working directory.
roles_path = /home/ansible/ansible/roles
host_key_checking = False
retry_files_enabled = False
forks = 10
timeout = 30
interpreter_python = auto_silent

[privilege_escalation]
become = True
become_method = sudo
become_ask_pass = False
